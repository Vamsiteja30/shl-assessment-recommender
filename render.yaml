services:
  - type: web
    name: shl-assessment-recommender
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r requirements.txt && python -m catalog.build_index"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GEMINI_API_KEY
        sync: false        # Set this manually in Render dashboard
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GROQ_API_KEY
        sync: false        # Set this manually in Render dashboard
      - key: FAISS_INDEX_PATH
        value: data/faiss_index.bin
      - key: FAISS_META_PATH 
        value: data/faiss_meta.pkl
      - key: TOP_K
        value: "15"
    healthCheckPath: /health
